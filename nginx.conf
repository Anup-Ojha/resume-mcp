# ─────────────────────────────────────────────────────────────────────────────
# NGINX configuration for resume-mcp.site
# FastAPI app runs on localhost:8000 (Docker exposes port 8000)
#
# Deploy steps (on your Linux VPS):
#   1.  sudo cp nginx.conf /etc/nginx/sites-available/resume-mcp.site
#   2.  sudo ln -s /etc/nginx/sites-available/resume-mcp.site \
#                  /etc/nginx/sites-enabled/resume-mcp.site
#   3.  sudo nginx -t          # test config
#   4.  sudo systemctl reload nginx
#   5.  sudo certbot --nginx -d resume-mcp.site -d www.resume-mcp.site
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect bare HTTP → HTTPS (certbot fills in the ssl block below) ────────
server {
    listen 80;
    listen [::]:80;
    server_name resume-mcp.site www.resume-mcp.site;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server block ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name resume-mcp.site www.resume-mcp.site;

    # ── TLS (certbot will overwrite these paths after running) ───────────────
    ssl_certificate     /etc/letsencrypt/live/resume-mcp.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/resume-mcp.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── File upload size (resume PDFs / DOCX can be large) ───────────────────
    client_max_body_size 20M;

    # ── Upstream: FastAPI (Docker, port 8000) ────────────────────────────────
    upstream fastapi {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ── MCP / SSE endpoint  ───────────────────────────────────────────────────
    # Server-Sent Events require:
    #   - HTTP/1.1 (no buffering)
    #   - proxy_buffering off
    #   - long read timeout
    #   - no Content-Encoding (gzip breaks SSE streams)
    location /mcp/ {
        proxy_pass         http://fastapi;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE — disable buffering so events are streamed immediately
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s;   # hold SSE connections open for 1 h
        proxy_send_timeout         3600s;

        # Prevent nginx from compressing the stream
        gzip off;

        # Allow the browser to keep the SSE connection alive
        proxy_set_header Connection "";
    }

    # ── Google OAuth callback ─────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://fastapi;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── All API & static routes → FastAPI ────────────────────────────────────
    location / {
        proxy_pass         http://fastapi;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts for API calls (PDF generation can take ~10 s)
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # WebSocket upgrade passthrough (if needed in future)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Gzip for everything except SSE ───────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Access / error logs ───────────────────────────────────────────────────
    access_log /var/log/nginx/resume-mcp.site.access.log;
    error_log  /var/log/nginx/resume-mcp.site.error.log warn;
}
